# 别名
jobname = pump

# 日志存放目录, 目录必须存在,不配置会存储在: data/log 下
log_dir = /opt/ripple/log

# 日志级别, 支持 debug/info/warning/error
log_level = info

# 工作目录
data = /opt/ripple/pumpdata

# trail文件目录，这里填capture的data目录
trail_dir = /opt/ripple/capturedata

# 网络发送端使用的端口号 collector 监听的端口
port = 7710

# 网络服务端的ip地址--collector端ip地址
host = 127.0.0.1

# trail 文件大小  MB（与capture相同）
trail_max_size = 16

# Type of parsing database(postgres/highgo)
dbtype = postgres

# Type of parsing database version(458)
dbversion = 12

# The database name that needs to be synchronized
dbname = postgres

#存量数据同步开启线程数量
max_work_per_refresh = 10

#兼容版本
compatibility = 10

#  tcp keepalive 机制启用, 0 关闭, 1 开启
tcp_keepalive = 1

# 等待对端 ack 的超时时间, 单位为毫秒, 配置区间0---300000
tcp_user_timeout = 60000

# 在开始发送保活探测数据包之前，TCP连接处于非活动状态的时间,单位秒, 配置区间:0--300
tcp_keepalives_idle = 30

# 发送 keepavlie 的间隔, 单位秒, 配置区间: 0--300
tcp_keepalives_interval = 3

# 发送 keepalive 的次数, 配置区间: 0--100
tcp_keepalives_count = 10
